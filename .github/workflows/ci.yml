name: ci

on:
  push:
    branches:
      - main
      - release
  pull_request:
    branches:
      - main
      - release
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ci-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache-dependency-path: package-lock.json
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Upload static build artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site-dist
          path: dist
          if-no-files-found: error

      - name: Lint Logics docs
        run: python3 logics/skills/logics-doc-linter/scripts/logics_lint.py

  release-branch-readiness:
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    needs:
      - quality-gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache-dependency-path: package-lock.json
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release changelog contract
        run: npm run release:changelog:validate

  browser-smoke:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/release'
    needs:
      - quality-gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache-dependency-path: package-lock.json
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for smoke validation
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tier
        run: npm run test:browser:smoke
