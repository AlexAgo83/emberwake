services:
  - type: web
    name: emberwake
    runtime: static
    plan: free
    branch: release
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_APP_NAME
        value: Emberwake
      - key: VITE_APP_ENV
        value: production
      - key: VITE_DEFAULT_DEBUG_OVERLAY
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /manifest.webmanifest
        name: Cache-Control
        value: no-cache
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
